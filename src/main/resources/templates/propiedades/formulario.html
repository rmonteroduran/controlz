<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Propiedad</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 600px;">
    <h2 class="mb-4" th:text="${propiedad.id != null} ? 'Modificar Propiedad' : 'Alta de Propiedad'"></h2>
    
    <!-- Mensajes de Error del Servidor -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    
    <form th:action="@{/propiedades/guardar}" th:object="${propiedad}" method="post" class="card p-4 shadow-sm mb-4">
        <input type="hidden" th:field="*{id}">
        
        <!-- Mostrar ID en vista de edición (no editable) -->
        <div class="mb-3" th:if="${propiedad.id != null}">
            <label class="form-label font-monospace fw-bold">ID de Propiedad:</label>
            <input type="text" class="form-control bg-light" th:value="${propiedad.id}" readonly disabled>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Dirección:</label>
            <input type="text" th:field="*{direccion}" class="form-control" required>
        </div>
        
		<div class="mb-3">
		    <label class="form-label">Ciudad:</label>
		    <select th:field="*{ciudad.id}" class="form-select" required>
		        <option value="">-- Seleccione Ciudad --</option>
		        <option th:each="c : ${ciudades}" th:value="${c.id}" th:text="${c.nombre}"></option>
		    </select>
		</div>
        
        <!-- Campo Propietario con Botón de Alta Rápida -->
        <div class="mb-3">
            <label class="form-label">Propietario:</label>
            <div class="input-group">
                <select th:field="*{propietario}" class="form-select" required>
                    <option value="">-- Seleccione Propietario --</option>
                    <option th:each="prop : ${propietarios}" th:value="${prop.id}" th:text="${prop.nombreCompleto}"></option>
                </select>
                <button class="btn btn-outline-primary" type="button" data-bs-toggle="modal" data-bs-target="#modalNuevoPropietario" title="Registrar Propietario">+</button>
            </div>
        </div>
        
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Tipo de Propiedad:</label>
                <select th:field="*{tipo}" class="form-select" required>
                    <option th:each="t : ${tipos}" th:value="${t}" th:text="${t}"></option>
                </select>
            </div>
            <div class="col mb-3">
                <label class="form-label">Estado de Disponibilidad:</label>
                <select th:field="*{estadoDisponibilidad}" class="form-select" required>
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                </select>
            </div>
        </div>
        
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Cantidad de Ambientes:</label>
                <input type="number" th:field="*{cantidadAmbientes}" class="form-control" min="1" required>
            </div>
            <div class="col mb-3">
                <label class="form-label">Metros Cuadrados:</label>
                <input type="number" step="0.1" th:field="*{metrosCuadrados}" class="form-control" min="1" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Descripción / Comodidades:</label>
            <textarea th:field="*{descripcion}" class="form-control" rows="3" required></textarea>
        </div>
        
		<div class="d-flex justify-content-end gap-2">
		    <a th:href="@{/propiedades}" class="btn btn-secondary">Cancelar</a>
		    <button type="submit" class="btn btn-warning fw-bold text-dark">
		        <span th:text="${propiedad.id == null} ? 'Registrar Propiedad' : 'Guardar Cambios'"></span>
		    </button>
		</div>
    </form>

    <!-- Modal para dar de alta propietario rápido (AJAX) -->
    <div class="modal fade" id="modalNuevoPropietario" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content shadow">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title" id="modalLabel">Registrar Nuevo Propietario</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="modalError" class="alert alert-danger d-none"></div>
                    <form id="formModalPropietario">
                        <div class="row">
                            <div class="col mb-3">
                                <label for="mNombre" class="form-label">Nombre:</label>
                                <input type="text" id="mNombre" class="form-control" required>
                            </div>
                            <div class="col mb-3">
                                <label for="mApellido" class="form-label">Apellido:</label>
                                <input type="text" id="mApellido" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="mDniCuit" class="form-label">DNI / CUIT:</label>
                            <input type="text" id="mDniCuit" class="form-control" required>
                        </div>
                        <div class="row">
                            <div class="col mb-3">
                                <label for="mTelefono" class="form-label">Teléfono:</label>
                                <input type="text" id="mTelefono" class="form-control">
                            </div>
                            <div class="col mb-3">
                                <label for="mEmail" class="form-label">Email:</label>
                                <input type="email" id="mEmail" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="mDomicilio" class="form-label">Domicilio:</label>
                            <input type="text" id="mDomicilio" class="form-control">
                        </div>
                    </form>
                </div>
				<div class="modal-footer">
				    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
				    <button type="button" id="btnGuardarPropietario" class="btn btn-primary fw-bold">Guardar Propietario</button>
				</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('btnGuardarPropietario').addEventListener('click', function() {
            const nombre = document.getElementById('mNombre').value.trim();
            const apellido = document.getElementById('mApellido').value.trim();
            const dniCuit = document.getElementById('mDniCuit').value.trim();
            const telefono = document.getElementById('mTelefono').value.trim();
            const email = document.getElementById('mEmail').value.trim();
            const domicilio = document.getElementById('mDomicilio').value.trim();
            
            const errorDiv = document.getElementById('modalError');
            errorDiv.classList.add('d-none');
            
            if (!nombre || !apellido || !dniCuit) {
                errorDiv.textContent = 'Nombre, Apellido y DNI/CUIT son obligatorios.';
                errorDiv.classList.remove('d-none');
                return;
            }
            
            const data = {
                nombre: nombre,
                apellido: apellido,
                dniCuit: dniCuit,
                telefono: telefono,
                email: email,
                domicilio: domicilio
            };
            
            fetch('/personas/api/guardar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
            .then(response => {
                if (!response.ok) {
                    return response.text().then(text => { throw new Error(text) });
                }
                return response.json();
            })
            .then(persona => {
                // Agregar al select y seleccionar
                const select = document.getElementById('propietario');
                const option = document.createElement('option');
                option.value = persona.id;
                option.textContent = persona.nombreCompleto;
                option.selected = true;
                select.appendChild(option);
                
                // Limpiar campos del modal
                document.getElementById('formModalPropietario').reset();
                
                // Cerrar modal
                const modalEl = document.getElementById('modalNuevoPropietario');
                const modal = bootstrap.Modal.getInstance(modalEl);
                modal.hide();
            })
            .catch(error => {
                errorDiv.textContent = error.message || 'Ocurrió un error al guardar.';
                errorDiv.classList.remove('d-none');
            });
        });
    </script>
</body>
</html>
