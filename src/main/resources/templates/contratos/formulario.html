<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Contrato</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 700px;">

    <h2 class="mb-4" th:text="${contrato.id != null} ? 'Modificar Contrato' : 'Alta de Contrato'"></h2>

    <!-- Mensajes de error del servidor -->
    <div th:if="${mensajeError}" class="alert alert-danger" th:text="${mensajeError}"></div>

    <form th:action="${contrato.id == null} ? @{/contratos/nuevo} : @{/contratos/editar/{id}(id=${contrato.id})}" 
          th:object="${contrato}" 
          method="post" 
          class="card p-4 shadow-sm mb-4">
        
        <input type="hidden" th:field="*{id}" />

        <!-- ID solo visible en edición (no modificable) -->
        <div class="mb-3" th:if="${contrato.id != null}">
            <label class="form-label font-monospace fw-bold">ID de Contrato:</label>
            <input type="text" class="form-control bg-light" th:value="${contrato.id}" readonly disabled>
        </div>

        <!-- Propiedad e Inquilino en paralelo -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="propiedad" class="form-label">Propiedad:</label>
                <select id="propiedad" th:field="*{propiedad.id}" class="form-select" required 
                        th:disabled="${contrato.id != null && contrato.estado.name() != 'BORRADOR'}">
                    <option value="">-- Seleccione propiedad --</option>
                    <option th:each="p : ${propiedades}" 
                            th:value="${p.id}" 
                            th:text="${p.direccion + ' (' + p.tipo + ')'}">
                    </option>
                </select>
                <input type="hidden" th:if="${contrato.id != null && contrato.estado.name() != 'BORRADOR'}" th:field="*{propiedad.id}" />
            </div>

            <div class="col-md-6 mb-3">
                <label for="inquilino" class="form-label">Inquilino / Persona:</label>
                <select id="inquilino" th:field="*{inquilino.id}" class="form-select" required
                        th:disabled="${contrato.id != null && contrato.estado.name() != 'BORRADOR'}">
                    <option value="">-- Seleccione inquilino --</option>
                    <option th:each="i : ${inquilinos}" 
                            th:value="${i.id}" 
                            th:text="${i.apellido + ', ' + i.nombre + ' (DNI/CUIT: ' + i.dniCuit + ')'}">
                    </option>
                </select>
                <input type="hidden" th:if="${contrato.id != null && contrato.estado.name() != 'BORRADOR'}" th:field="*{inquilino.id}" />
            </div>
        </div>

        <!-- Datos comerciales y vigencia -->
        <div class="row">
            <div class="col-md-4 mb-3">
                <label for="fechaInicio" class="form-label">Fecha de Inicio:</label>
                <input type="date" id="fechaInicio" th:field="*{fechaInicio}" class="form-control" required />
            </div>

            <div class="col-md-4 mb-3">
                <label for="duracionMeses" class="form-label">Duración (Meses):</label>
                <input type="number" id="duracionMeses" th:field="*{duracionMeses}" class="form-control" min="1" placeholder="Ej: 24" required />
            </div>

            <div class="col-md-4 mb-3">
                <label for="diaVencimiento" class="form-label">Día de Vencimiento:</label>
                <input type="number" id="diaVencimiento" th:field="*{diaVencimiento}" class="form-control" min="1" max="31" placeholder="1 al 31" required />
            </div>
        </div>

        <!-- Importe y Estado -->
        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="importeMensual" class="form-label">Importe Mensual:</label>
                <div class="input-group">
                    <span class="input-group-text">$</span>
                    <input type="number" step="0.01" id="importeMensual" th:field="*{importeMensual}" class="form-control" min="0.01" placeholder="0.00" required />
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <label for="estado" class="form-label">Estado del Contrato:</label>
                <select id="estado" th:field="*{estado}" class="form-select" required>
                    <option th:each="est : ${estados}" 
                            th:value="${est}" 
                            th:text="${est}"
                            th:disabled="${contrato.id == null && est.name() != 'BORRADOR' && est.name() != 'ACTIVO'}">
                    </option>
                </select>
            </div>
        </div>

        <!-- Notas adicionales -->
        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción / Notas Adicionales:</label>
            <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="3" placeholder="Detalles específicos del acuerdo, cláusulas especiales, etc."></textarea>
        </div>

        <!-- Botones de Acción -->
        <div class="d-flex justify-content-end gap-2 mt-3">
            <a th:href="@{/contratos}" class="btn btn-secondary">Cancelar</a>
            <button type="submit" class="btn btn-success fw-bold text-white">
                <span th:text="${contrato.id == null} ? 'Registrar Contrato' : 'Guardar Cambios'"></span>
            </button>
        </div>

    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
