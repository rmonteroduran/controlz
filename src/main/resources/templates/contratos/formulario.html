<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${contrato.id == null} ? 'Inmobiliaria - Nuevo Contrato' : 'Inmobiliaria - Editar Contrato'">Contrato</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div class="container mt-5" style="max-width: 800px;">

    <div class="mb-4">
        <h2 th:if="${contrato.id == null}"><i class="bi bi-file-earmark-plus"></i> Registrar Nuevo Contrato</h2>
        <h2 th:if="${contrato.id != null}"><i class="bi bi-pencil-square"></i> Modificar Contrato N° <span th:text="${contrato.id}"></span></h2>
        <p class="text-muted">Complete los datos comerciales del contrato de locación.</p>
    </div>

    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <strong><i class="bi bi-exclamation-triangle"></i> No se pudo guardar:</strong> 
        <span th:text="${mensajeError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
            
            <form th:action="${contrato.id == null} ? @{/contratos/nuevo} : @{/contratos/editar/{id}(id=${contrato.id})}" 
                  th:object="${contrato}" 
                  method="post" 
                  class="row g-3">
                
                <input type="hidden" th:field="*{id}" />

                <div class="col-md-6">
                    <label for="propiedad" class="form-label fw-bold">Propiedad (*)</label>
                    <select id="propiedad" th:field="*{propiedad.id}" class="form-select" required 
                            th:disabled="${contrato.id != null && contrato.estado.name() != 'BORRADOR'}">
                        <option value="">-- Seleccione una propiedad --</option>
                        <option th:each="p : ${propiedades}" 
                                th:value="${p.id}" 
                                th:text="${p.direccion + ' (' + p.tipo + ')'}">
                        </option>
                    </select>
                    <input type="hidden" th:if="${contrato.id != null && contrato.estado.name() != 'BORRADOR'}" th:field="*{propiedad.id}" />
                </div>

                <div class="col-md-6">
                    <label for="inquilino" class="form-label fw-bold">Inquilino / Persona (*)</label>
                    <select id="inquilino" th:field="*{inquilino.id}" class="form-select" required
                            th:disabled="${contrato.id != null && contrato.estado.name() != 'BORRADOR'}">
                        <option value="">-- Seleccione un inquilino --</option>
                        <option th:each="i : ${inquilinos}" 
                                th:value="${i.id}" 
                                th:text="${i.apellido + ', ' + i.nombre + ' (DNI: ' + i.dni + ')'}">
                        </option>
                    </select>
                    <input type="hidden" th:if="${contrato.id != null && contrato.estado.name() != 'BORRADOR'}" th:field="*{inquilino.id}" />
                </div>

                <div class="col-md-4">
                    <label for="fechaInicio" class="form-label fw-bold">Fecha de Inicio (*)</label>
                    <input type="date" id="fechaInicio" th:field="*{fechaInicio}" class="form-control" required />
                </div>

                <div class="col-md-4">
                    <label for="duracionMeses" class="form-label fw-bold">Duración (Meses) (*)</label>
                    <input type="number" id="duracionMeses" th:field="*{duracionMeses}" class="form-control" min="1" placeholder="Ej: 24" required />
                </div>

                <div class="col-md-4">
                    <label for="diaVencimiento" class="form-label fw-bold">Día de Vencimiento (*)</label>
                    <input type="number" id="diaVencimiento" th:field="*{diaVencimiento}" class="form-control" min="1" max="31" placeholder="1 al 31" required />
                </div>

                <div class="col-md-6">
                    <label for="importeMensual" class="form-label fw-bold">Importe Mensual ($) (*)</label>
                    <div class="input-group">
                        <span class="input-group-text">$</span>
                        <input type="number" id="importeMensual" th:field="*{importeMensual}" class="form-control" step="0.01" min="0.01" placeholder="0.00" required />
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="estado" class="form-label fw-bold">Estado del Contrato (*)</label>
                    <select id="estado" th:field="*{estado}" class="form-select" required>
                        <option th:each="est : ${estados}" 
                                th:value="${est}" 
                                th:text="${est}"
                                th:disabled="${contrato.id == null && est.name() != 'BORRADOR' && est.name() != 'ACTIVO'}">
                        </option>
                    </select>
                </div>

                <div class="col-12">
                    <label for="descripcion" class="form-label fw-bold">Descripción / Notas Adicionales</label>
                    <textarea id="descripcion" th:field="*{descripcion}" class="form-control" rows="3" placeholder="Detalles específicos del acuerdo, cláusulas especiales, etc."></textarea>
                </div>

                <div class="col-12 d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/contratos}" class="btn btn-secondary">Cancelar</a>
                    <button type="submit" class="btn btn-primary">
                        <span th:text="${contrato.id == null} ? 'Registrar Contrato' : 'Guardar Cambios'"></span>
                    </button>
                </div>

            </form>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/bundle.min.js"></script>
</body>
</html>
