<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inmobiliaria - Gestión de Contratos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="container mt-4">

    <a th:href="@{/}" class="btn btn-outline-secondary mb-4">
        <i class="bi bi-arrow-left"></i> Volver al Inicio
    </a>
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-file-earmark-text-fill text-success"></i> Contratos</h2>
        <a th:href="@{/contratos/nuevo}" class="btn btn-success fw-bold text-white">Nuevo Contrato</a>
    </div>

    <!-- Mensajes de éxito y error -->
    <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${mensajeExito}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-octagon-fill"></i> <span th:text="${mensajeError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Sección de Filtros (Estilo exacto a Propiedades/Facturas) -->
    <div class="card p-3 mb-4 bg-light shadow-sm">
        <form method="get" th:action="@{/contratos}" class="row g-3">
            <div class="col-md-3">
                <label for="propiedadId" class="form-label font-monospace">Propiedad</label>
                <select id="propiedadId" name="propiedadId" class="form-select">
                    <option value="">-- Todas --</option>
                    <option th:each="p : ${propiedades}" 
                            th:value="${p.id}" 
                            th:text="${p.direccion + ' (' + p.tipo + ')'}"
                            th:selected="${param.propiedadId != null && param.propiedadId[0] == p.id.toString()}">
                    </option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="inquilinoId" class="form-label font-monospace">Inquilino</label>
                <select id="inquilinoId" name="inquilinoId" class="form-select">
                    <option value="">-- Todos --</option>
                    <option th:each="i : ${inquilinos}" 
                            th:value="${i.id}" 
                            th:text="${i.apellido + ', ' + i.nombre}"
                            th:selected="${param.inquilinoId != null && param.inquilinoId[0] == i.id.toString()}">
                    </option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="estado" class="form-label font-monospace">Estado</label>
                <select id="estado" name="estado" class="form-select">
                    <option value="">-- Todos --</option>
                    <option th:each="est : ${estados}" 
                            th:value="${est}" 
                            th:text="${est}"
                            th:selected="${param.estado != null && param.estado[0] == est.name()}">
                    </option>
                </select>
            </div>
            <div class="col-md-3">
                <label for="fechaInicio" class="form-label font-monospace">Fecha de Inicio</label>
                <input type="date" id="fechaInicio" name="fechaInicio" class="form-control"
                       th:value="${param.fechaInicio}">
            </div>
            <div class="col-12 d-flex gap-2">
                <button type="submit" class="btn btn-secondary">Filtrar</button>
                <a th:href="@{/contratos}" class="btn btn-outline-secondary">Limpiar</a>
            </div>
        </form>
    </div>

    <!-- Tabla de Contratos (Estilo plano exacto a Propiedades) -->
    <table class="table table-striped table-hover border shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Propiedad</th>
                <th>Inquilino</th>
                <th>Fecha Inicio</th>
                <th>Duración</th>
                <th>Importe Mensual</th>
                <th>Vencimiento</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="c : ${contratos}">
                <td th:text="${c.id}" class="fw-bold text-muted"></td>
                <td th:text="${c.propiedad.direccion}"></td>
                <td th:text="${c.inquilino.apellido + ', ' + c.inquilino.nombre}"></td>
                <td th:text="${#temporals.format(c.fechaInicio, 'dd/MM/yyyy')}"></td>
                <td th:text="${c.duracionMeses + ' meses'}"></td>
                <td th:text="${'$' + #numbers.formatDecimal(c.importeMensual, 1, 'POINT', 2, 'COMMA')}"></td>
                <td th:text="${'Día ' + c.diaVencimiento}"></td>
                <td>
                    <span class="badge" 
                        th:classappend="${c.estado.name() == 'BORRADOR' ? 'bg-warning text-dark' : 
                                        c.estado.name() == 'ACTIVO' ? 'bg-success' : 
                                        c.estado.name() == 'FINALIZADO' ? 'bg-secondary' : 'bg-danger'}"
                        th:text="${c.estado}">
                        BORRADOR
                    </span>
                </td>
                <td>
                    <a th:href="@{/contratos/editar/{id}(id=${c.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/contratos/eliminar/{id}(id=${c.id})}" 
                       class="btn btn-sm btn-danger" 
                       th:classappend="${c.estado.name() != 'BORRADOR' ? 'disabled' : ''}"
                       onclick="return confirm('¿Está seguro de que desea eliminar este contrato de forma lógica?');"
                       title="Eliminar (Solo Borradores)">
                        Eliminar
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(contratos)}">
                <td colspan="9" class="text-center text-muted py-3">No hay contratos registrados o que coincidan con los filtros.</td>
            </tr>
        </tbody>
    </table>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
