<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Factura</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 700px;">
    <h2 class="mb-4" th:text="${factura.id != null} ? 'Modificar Factura' : 'Alta de Factura'"></h2>

    <!-- Mensajes de error del servidor -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${factura.id} == null ? '/facturas/nueva' : '/facturas/editar/' + ${factura.id}"
          th:object="${factura}"
          method="post"
          class="card p-4 shadow-sm mb-4">

        <!-- ID solo visible en edición -->
        <div class="mb-3" th:if="${factura.id != null}">
            <label class="form-label font-monospace fw-bold">ID de Factura:</label>
            <input type="text" class="form-control bg-light" th:value="${factura.id}" readonly disabled>
        </div>

		<div class="mb-3">
		    <label class="form-label">Contrato:</label>
		    <select th:field="*{contrato.id}"
		            class="form-select"
		            required
		            th:disabled="${factura.id != null}">
		        <option value="">-- Seleccione un contrato --</option>
		        <option th:each="c : ${contratos}"
		                th:value="${c.id}"
		                th:text="'Contrato #' + ${c.id}">
		        </option>
		    </select>
		    <small th:if="${factura.id != null}" class="text-muted">El contrato no puede modificarse después de creada la factura.</small>
		</div>

        <div class="mb-3">
            <label class="form-label">Concepto:</label>
            <input type="text" th:field="*{concepto}" class="form-control" required>
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Fecha de Emisión:</label>
                <input type="date" th:field="*{fechaEmision}" class="form-control" required>
            </div>
            <div class="col mb-3">
                <label class="form-label">Fecha de Vencimiento:</label>
                <input type="date" th:field="*{fechaVencimiento}" class="form-control" required>
            </div>
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Importe:</label>
                <input type="number" step="0.01" th:field="*{importe}" class="form-control" min="0" required>
            </div>
            <div class="col mb-3">
                <label class="form-label">Estado:</label>
                <select th:field="*{estado}" class="form-select" required>
                    <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
                </select>
            </div>
        </div>

        <hr>
        <h5 class="text-secondary mb-3">Datos de Pago <small class="text-muted">(solo si el estado es PAGADA)</small></h5>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Fecha de Pago:</label>
                <input type="date" th:field="*{fechaPago}" class="form-control">
            </div>
            <div class="col mb-3">
                <label class="form-label">Medio de Pago:</label>
                <select th:field="*{medioDePago}" class="form-select">
                    <option value="">-- Seleccione --</option>
                    <option th:each="m : ${mediosDePago}" th:value="${m}" th:text="${m}"></option>
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Importe Pagado:</label>
                <input type="number" step="0.01" th:field="*{importePago}" class="form-control" min="0">
            </div>
            <div class="col mb-3">
                <label class="form-label">Interés:</label>
                <input type="number" step="0.01" th:field="*{interes}" class="form-control" min="0">
            </div>
        </div>

		<div class="d-flex justify-content-end gap-2">
		    <a th:href="@{/facturas}" class="btn btn-secondary">Cancelar</a>
		    <button type="submit" class="btn btn-danger fw-bold text-white">
		        <span th:text="${factura.id == null} ? 'Registrar Factura' : 'Guardar Cambios'"></span>
		    </button>
		</div>
    </form>

</body>
</html>
