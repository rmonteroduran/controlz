<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inmobiliaria - Gestión de Publicaciones</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="container mt-4">
	<a th:href="@{/}" class="btn btn-outline-secondary mb-4">
	    <i class="bi bi-arrow-left"></i> Volver al Inicio
	</a>
    <!-- Cabecera alineada horizontal y verticalmente -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-megaphone-fill text-info"></i> Publicaciones</h2>
        <a th:href="@{/publicaciones/nueva}" class="btn btn-info fw-bold text-dark">Nueva Publicación</a>
    </div>

    <!-- Mensajes de Error -->
    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <!-- ================= SECCIÓN DE FILTROS ================= -->
    <div class="card p-3 mb-4 bg-light shadow-sm">
        <form method="get" th:action="@{/publicaciones}" class="row g-3">
            
            <div class="col-md-2">
                <label for="filterPropiedad" class="form-label font-monospace">Propiedad</label>
                <select id="filterPropiedad" name="propiedadId" class="form-select">
                    <option value="">-- Todas --</option>
                    <option th:each="p : ${propiedades}"
                            th:value="${p.id}"
                            th:text="${p.direccion}"
                            th:selected="${propiedadId == p.id}">
                    </option>
                </select>
            </div>

            <div class="col-md-2">
                <label for="filterCiudad" class="form-label font-monospace">Ciudad</label>
                <input type="text" id="filterCiudad" name="ciudad" th:value="${ciudad}" class="form-control" placeholder="Ciudad...">
            </div>

            <div class="col-md-2">
                <label for="filterEstado" class="form-label font-monospace">Estado</label>
                <select id="filterEstado" name="estado" class="form-select">
                    <option value="">-- Todos --</option>
                    <option th:each="e : ${estados}"
                            th:value="${e}"
                            th:text="${e}"
                            th:selected="${estado == e}">
                    </option>
                </select>
            </div>

            <div class="col-md-2">
                <label for="filterPrecioMin" class="form-label font-monospace">Precio Min.</label>
                <input type="number" step="0.01" id="filterPrecioMin" name="precioMin" th:value="${precioMin}" class="form-control" placeholder="Mínimo...">
            </div>

            <div class="col-md-2">
                <label for="filterPrecioMax" class="form-label font-monospace">Precio Max.</label>
                <input type="number" step="0.01" id="filterPrecioMax" name="precioMax" th:value="${precioMax}" class="form-control" placeholder="Máximo...">
            </div>

            <!-- Botones de Acción alineados al final del row -->
            <div class="col-md-2 d-flex align-items-end gap-2">
                <button type="submit" class="btn btn-secondary w-100">Filtrar</button>
                <a th:href="@{/publicaciones}" class="btn btn-outline-secondary w-100">Limpiar</a>
            </div>

        </form>
    </div>

    <!-- ================= TABLA DE RESULTADOS ================= -->
    <table class="table table-striped table-hover border shadow-sm">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Condiciones</th>
                <th>Precio Mensual</th>
                <th>Fecha</th>
                <th>Propiedad</th>
				<th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${publicaciones}">
                <td th:text="${p.id}" class="fw-bold text-muted"></td>
                <td th:text="${p.condiciones}"></td>
                <td th:text="${p.precioMensual}"></td>
                <td th:text="${p.fechaPublicacion}"></td>
                <td th:text="${p.propiedad.direccion}" class="text-secondary"></td>
				<td>
				    <!-- Estado estilizado como badge -->
				    <span th:text="${p.estadoPublicacion}" class="badge bg-info text-dark"></span>
				</td>
                <td>
                    <a th:href="@{/publicaciones/editar/{id}(id=${p.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/publicaciones/eliminar/{id}(id=${p.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Seguro que desea dar de baja esta publicación?')">Eliminar</a>
                </td>
            </tr>
            <!-- Mensaje cuando no hay registros -->
            <tr th:if="${#lists.isEmpty(publicaciones)}">
                <td colspan="7" class="text-center text-muted py-3">No hay publicaciones registradas o activas con los filtros seleccionados.</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
