<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Publicaciones</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between mb-3">
    <h2>Publicaciones</h2>

    <a th:href="@{/publicaciones/nueva}" class="btn btn-primary">
        Nueva Publicación
    </a>
</div>

<div th:if="${error}" class="alert alert-danger">
    <span th:text="${error}"></span>
</div>

<!-- ================= FILTROS ================= -->

<form method="get" th:action="@{/publicaciones}" class="card p-3 mb-4">

    <div class="row">

        <div class="col-md-3">
            <label>Propiedad</label>

            <select name="propiedadId" class="form-select">

                <option value="">Todas</option>

                <option th:each="p : ${propiedades}"
                        th:value="${p.id}"
                        th:text="${p.direccion}"
                        th:selected="${propiedadId == p.id}">
                </option>

            </select>
        </div>

        <div class="col-md-2">
            <label>Ciudad</label>

            <input type="text"
                   name="ciudad"
                   class="form-control"
                   th:value="${ciudad}">
        </div>

        <div class="col-md-2">
            <label>Estado</label>

            <select name="estado" class="form-select">

                <option value="">Todos</option>

                <option th:each="e : ${estados}"
                        th:value="${e}"
                        th:text="${e}"
                        th:selected="${estado == e}">
                </option>

            </select>
        </div>

        <div class="col-md-2">
            <label>Precio mínimo</label>

            <input type="number"
                   step="0.01"
                   name="precioMin"
                   class="form-control"
                   th:value="${precioMin}">
        </div>

        <div class="col-md-2">
            <label>Precio máximo</label>

            <input type="number"
                   step="0.01"
                   name="precioMax"
                   class="form-control"
                   th:value="${precioMax}">
        </div>

        <div class="col-md-1 d-flex align-items-end">

            <button class="btn btn-primary w-100">
                Buscar
            </button>

        </div>

    </div>

    <div class="mt-3">
        <a th:href="@{/publicaciones}" class="btn btn-secondary">
            Limpiar filtros
        </a>
    </div>

</form>

<!-- ================= TABLA ================= -->

<table class="table table-striped">

    <thead>
        <tr>
            <th>ID</th>
            <th>Condiciones</th>
            <th>Precio Mensual</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Propiedad</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>

        <tr th:each="p : ${publicaciones}">

            <td th:text="${p.id}"></td>
            <td th:text="${p.condiciones}"></td>
            <td th:text="${p.precioMensual}"></td>
            <td th:text="${p.fechaPublicacion}"></td>
            <td th:text="${p.estadoPublicacion}"></td>
            <td th:text="${p.propiedad.direccion}"></td>

            <td>

                <a th:href="@{/publicaciones/editar/{id}(id=${p.id})}"
                   class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/publicaciones/eliminar/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar publicación?')">
                    Eliminar
                </a>

            </td>

        </tr>

    </tbody>

</table>

</body>
</html>
