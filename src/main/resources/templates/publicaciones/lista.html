<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Publicaciones</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">

<div class="d-flex justify-content-between mb-3">
    <h2>Publicaciones</h2>
    <a th:href="@{/publicaciones/nueva}" class="btn btn-primary">
        Nueva Publicación
    </a>
</div>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>Condiciones</th>
            <th>Precio Mensual</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Propiedad</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>
        <tr th:each="p : ${publicaciones}">
            <td th:text="${p.id}"></td>
            <td th:text="${p.condiciones}"></td>
            <td th:text="${p.precioMensual}"></td>
            <td th:text="${p.fechaPublicacion}"></td>
            <td th:text="${p.estadoPublicacion}"></td>
            <td th:text="${p.propiedad.direccion}"></td>
            <td>
                <a th:href="@{/publicaciones/eliminar/{id}(id=${p.id})}"
                   class="btn btn-danger btn-sm">
                   Eliminar
                </a>
            </td>
        </tr>
    </tbody>
</table>

</body>
</html>
