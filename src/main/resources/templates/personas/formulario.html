<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Propietario</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4" style="max-width: 600px;">
    <h2 class="mb-4">Alta de Nuevo Propietario</h2>
    
    <form th:action="@{/personas/guardar}" th:object="${persona}" method="post" class="card p-4 shadow-sm">
        
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Nombre:</label>
                <input type="text" th:field="*{nombre}" class="form-control" required>
            </div>
            <div class="col mb-3">
                <label class="form-label">Apellido:</label>
                <input type="text" th:field="*{apellido}" class="form-control" required>
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">DNI / CUIT:</label>
            <input type="text" th:field="*{dniCuit}" class="form-control" required>
        </div>
        
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Teléfono:</label>
                <input type="text" th:field="*{telefono}" class="form-control">
            </div>
            <div class="col mb-3">
                <label class="form-label">Email:</label>
                <input type="email" th:field="*{email}" class="form-control">
            </div>
        </div>
        
        <div class="mb-3">
            <label class="form-label">Domicilio:</label>
            <input type="text" th:field="*{domicilio}" class="form-control">
        </div>
        
        <div class="d-flex justify-content-end gap-2">
            <a th:href="@{/propiedades/nueva}" class="btn btn-secondary">Volver al Formulario de Propiedad</a>
            <button type="submit" class="btn btn-success">Guardar Propietario</button>
        </div>
    </form>
</body>
</html>
